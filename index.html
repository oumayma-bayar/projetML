<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <title>Mon projet Pyodide</title>
    <script src="./pyodide/pyodide.js"></script>
    <style>
      body { font-family: Arial; padding: 30px; background: #f9f9f9; }
      h1 { color: #333; }
      textarea {
        width: 100%; height: 150px;
        font-size: 14px; font-family: monospace;
        padding: 10px; border: 1px solid #ccc;
        border-radius: 5px;
      }
      button {
        margin-top: 10px; padding: 10px 25px;
        font-size: 14px; background: #306998;
        color: white; border: none;
        border-radius: 5px; cursor: pointer;
      }
      button:hover { background: #254f7a; }
      pre {
        background: #1e1e1e; color: #00ff90;
        padding: 15px; border-radius: 5px;
        margin-top: 15px; font-size: 14px;
        min-height: 60px;
      }
      #status { color: gray; font-style: italic; }
    </style>
  </head>
  <body>
    <h1>🐍 Pyodide — Python dans le navigateur</h1>
    <p id="status">⏳ Chargement de Python...</p>

    <textarea id="code">
# Écrivez votre code Python ici
import sys
print(f"Python {sys.version}")

nombres = [1, 2, 3, 4, 5]
print(f"Somme : {sum(nombres)}")
print(f"Moyenne : {sum(nombres)/len(nombres)}")
    </textarea>

    <br>
    <button onclick="runPython()">▶ Exécuter</button>

    <pre id="output">Le résultat apparaîtra ici...</pre>

    <script>
      let pyodide;

      async function init() {
        pyodide = await loadPyodide({ indexURL: "./pyodide/" });
        document.getElementById("status").textContent = "✅ Python prêt !";
      }

      async function runPython() {
        const code = document.getElementById("code").value;
        const output = document.getElementById("output");
        try {
          pyodide.runPython(`
import sys, io
sys.stdout = io.StringIO()
          `);
          pyodide.runPython(code);
          const result = pyodide.runPython("sys.stdout.getvalue()");
          output.textContent = result || "✅ Exécuté sans sortie.";
        } catch (err) {
          output.textContent = "❌ Erreur : " + err.message;
        }
      }

      init();
    </script>
  </body>
</html>
